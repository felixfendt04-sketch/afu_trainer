name: Supabase Heartbeat
on:
  schedule:
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          curl -X POST \
            "${SUPABASE_URL}/rest/v1/ping" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'
